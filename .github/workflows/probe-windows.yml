name: probe – ReadDirectoryChangesExW Windows 検証

on:
  push:
    branches:
      - "claude/raw-events-observer-Htqht"
      - "experiment/notify-rdcexw"
  workflow_dispatch:

jobs:
  probe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-probe-${{ hashFiles('**/Cargo.lock') }}

      - name: Build raw-events
        run: cargo build -p raw-events --bin raw-events

      - name: Run probe and observe Windows events
        shell: pwsh
        run: |
          $watchDir = "$env:TEMP\probe-watch"
          New-Item -ItemType Directory -Force -Path $watchDir | Out-Null
          $outFile = "$env:TEMP\probe-out.txt"

          $proc = Start-Process -FilePath ".\target\debug\raw-events.exe" `
                                -ArgumentList $watchDir `
                                -NoNewWindow -PassThru `
                                -RedirectStandardOutput $outFile
          Start-Sleep -Seconds 2

          function Op($label) {
            Write-Host ""; Write-Host ">>> $label"
            Start-Sleep -Milliseconds 700
          }

          Op "ファイル作成"
          New-Item -ItemType File -Force -Path "$watchDir\a.txt" | Out-Null
          Set-Content -Path "$watchDir\a.txt" -Value "hello"

          Op "ファイル削除"
          Remove-Item -Path "$watchDir\a.txt"

          Op "空ディレクトリ作成"
          New-Item -ItemType Directory -Force -Path "$watchDir\emptydir" | Out-Null

          Op "空ディレクトリ削除"
          Remove-Item -Force -Path "$watchDir\emptydir"

          Op "ファイル入りディレクトリ作成"
          New-Item -ItemType Directory -Force -Path "$watchDir\fulldir" | Out-Null
          Set-Content -Path "$watchDir\fulldir\x.txt" -Value "x"
          Set-Content -Path "$watchDir\fulldir\y.txt" -Value "y"

          Op "ファイル入りディレクトリ削除"
          Remove-Item -Recurse -Force -Path "$watchDir\fulldir"

          Op "ファイルリネーム"
          Set-Content -Path "$watchDir\src.txt" -Value "rename me"
          Start-Sleep -Milliseconds 500
          Rename-Item -Path "$watchDir\src.txt" -NewName "dst.txt"
          Start-Sleep -Milliseconds 500
          Remove-Item -Path "$watchDir\dst.txt"

          Start-Sleep -Seconds 2
          $proc.Kill()
          Start-Sleep -Milliseconds 500

          $content = Get-Content $outFile -Raw
          Write-Host ""
          Write-Host "======== PROBE OUTPUT ========"
          Write-Host $content

          @"
## probe output (notify-fork / ReadDirectoryChangesExW)

``````
$content
``````
"@ | Out-File -Append $env:GITHUB_STEP_SUMMARY

          "PROBE_OUT=$outFile" | Out-File -Append $env:GITHUB_ENV

      - name: Upload probe output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: probe-windows-output
          path: ${{ env.PROBE_OUT }}
