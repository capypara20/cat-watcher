name: Release

on:
  push:
    branches:
      - main

jobs:
  tag:
    name: Create Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      created: ${{ steps.tag.outputs.created }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' cat-watcher/Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create tag if not exists
        id: tag
        uses: actions/github-script@v7
        with:
          script: |
            const tag = `v${{ steps.version.outputs.version }}`;
            try {
              await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tag}`,
              });
              console.log(`Tag ${tag} already exists, skipping release.`);
              core.setOutput('tag', tag);
              core.setOutput('created', 'false');
            } catch (e) {
              if (e.status !== 404) throw e;
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/tags/${tag}`,
                sha: context.sha,
              });
              console.log(`Created tag ${tag}`);
              core.setOutput('tag', tag);
              core.setOutput('created', 'true');
            }

  build:
    name: Build (${{ matrix.name }})
    needs: tag
    if: needs.tag.outputs.created == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: cat-watcher.exe
            artifact_suffix: windows-x86_64

          - name: Linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: cat-watcher
            artifact_suffix: linux-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --manifest-path cat-watcher/Cargo.toml

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cat-watcher-${{ matrix.artifact_suffix }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: [tag, build]
    if: needs.tag.outputs.created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: cat-watcher-windows-x86_64
          path: dist/windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: cat-watcher-linux-x86_64
          path: dist/linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          files: |
            dist/windows/cat-watcher.exe
            dist/linux/cat-watcher
          generate_release_notes: true
